<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onam 2026 · Admin Console</title>
<style>
  :root{--saffron:#ff6a00;--green:#0b7a3b;--red:#d7263d;--gold:#f4b400;--ink:#3a2600;--card:#fffdf7}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#fff3dc,#fff);min-height:100vh}
  .demoNote{background:#fff0b3;color:#7a4d00;text-align:center;padding:8px 12px;font-size:13px;font-weight:600}
  .bar{background:var(--green);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .bar b{font-size:18px}
  .bar .who{font-size:13px;opacity:.9}
  .bar button{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:600}
  .wrap{max-width:960px;margin:0 auto;padding:18px}
  .card{background:var(--card);border-radius:14px;box-shadow:0 8px 24px rgba(120,60,0,.15);padding:20px;margin-bottom:18px}
  h1{color:var(--saffron);margin:.2em 0;font-size:24px}
  h2{color:#7a4d00;margin:.3em 0}
  label{display:block;font-size:13px;font-weight:600;color:#9a7326;margin:10px 0 4px}
  input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #e6d3a8;border-radius:10px;font-size:15px;background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--saffron)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1 1 200px}
  .btn{background:var(--saffron);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:scale(.98)}
  .btn.green{background:var(--green)} .btn.sm{padding:7px 12px;font-size:13px;margin-top:0}
  .btn.grey{background:#b98a3a}
  .msg{margin-top:12px;padding:10px 14px;border-radius:10px;font-weight:600;display:none}
  .msg.ok{background:#e6f7ec;color:#0b7a3b;display:block}
  .msg.err{background:#fde8ea;color:#d7263d;display:block}
  .login{max-width:380px;margin:8vh auto}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
  th{background:var(--green);color:#fff;padding:9px;text-align:left}
  td{padding:8px 9px;border-bottom:1px solid #f0e2c2;vertical-align:middle}
  .del{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}
  .tab{background:#fff;border:1.5px solid #e6d3a8;border-radius:24px;padding:9px 18px;font-weight:700;cursor:pointer;color:#9a7326}
  .tab.active{background:var(--saffron);color:#fff;border-color:var(--saffron)}
  .sec{display:none} .sec.active{display:block}
  .pill{display:inline-block;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
  .pill.live{background:#d7263d;color:#fff} .pill.done{background:#e6f7ec;color:#0b7a3b} .pill.sched{background:#fff0b3;color:#a1560a}
  .matchrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #f0e2c2;border-radius:10px;padding:10px;margin-bottom:8px}
  .matchrow .vs{font-weight:800;flex:1 1 200px}
  .matchrow input,.matchrow select{width:auto;padding:6px 8px;font-size:14px}
  .scoreIn{width:52px !important;text-align:center}
  .hint{font-size:12px;color:#a07a3a;margin-top:6px}
  .count{background:#fff0b3;color:#a1560a;border-radius:20px;padding:3px 12px;font-weight:700;font-size:13px}
  #loginView,#appView{display:none}
</style>
</head>
<body>

<div id="loginView">
  <div class="card login">
    <h1>🔐 Admin Login</h1>
    <p style="color:#8a6a2a;font-size:14px">CAFS Onam 2026 · Admin Console</p>
    <label>Username</label>
    <input id="u" autocomplete="username" placeholder="admin">
    <label>Password</label>
    <input id="p" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" style="width:100%" onclick="login()">Log in</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="appView">
  <div class="bar">
    <b>🌼 Onam 2026 · Admin Console</b>
    <div><span class="who" id="whoLabel"></span> &nbsp;
      <button onclick="refreshAll(true)">↻ Refresh</button>
      <button onclick="logout()">Log out</button></div>
  </div>
  <div class="wrap">
    <div class="tabs">
      <button class="tab active" data-t="tab-part" onclick="switchTab(this)">👤 Participants</button>
      <button class="tab" data-t="tab-sport" onclick="switchTab(this)">🏆 Sports &amp; Matches</button>
      <button class="tab" data-t="tab-teams" onclick="switchTab(this)">🥇 Team Points</button>
    </div>

    <!-- PARTICIPANTS -->
    <div class="sec active" id="tab-part">
      <div class="card">
        <h1>➕ Add Participant</h1>
        <div class="row">
          <div><label>Event *</label><select id="f_event"></select></div>
          <div><label>Team (type or pick)</label>
            <input id="f_team" list="teamlist" placeholder="e.g. Team A">
            <datalist id="teamlist"></datalist></div>
        </div>
        <div class="row">
          <div><label>Participant name(s) *</label><input id="f_name" placeholder="e.g. Arun (or 'Arun & Vishnu')"></div>
          <div><label>Department</label><input id="f_dept" placeholder="e.g. Engineering"></div>
        </div>
        <div class="row">
          <div><label>Phone</label><input id="f_phone" inputmode="tel" placeholder="10-digit number"></div>
          <div><label>Gender</label><select id="f_gender"><option value="">— n/a —</option><option>Gents</option><option>Ladies</option></select></div>
        </div>
        <label>Notes</label><input id="f_notes" placeholder="optional">
        <button class="btn" onclick="addParticipant()">Save participant</button>
        <div class="msg" id="addMsg"></div>
      </div>
      <div class="card">
        <div class="row" style="align-items:center">
          <h1 style="flex:1;margin:0">📋 All Registrations</h1>
          <span class="count" id="totalCount">0</span>
        </div>
        <div class="row">
          <input id="search" placeholder="🔍 search name / dept / phone…" oninput="renderList()">
          <select id="filterEvent" onchange="renderList()"><option value="">All events</option></select>
        </div>
        <div style="max-height:55vh;overflow:auto">
          <table><thead><tr><th>#</th><th>Event</th><th>Name</th><th>Dept</th><th>Phone</th><th>Team</th><th></th></tr></thead>
          <tbody id="listBody"></tbody></table>
        </div>
      </div>
    </div>

    <!-- SPORTS & MATCHES -->
    <div class="sec" id="tab-sport">
      <div class="card">
        <h1>🏆 Sports &amp; Matches</h1>
        <label>Select a sport</label>
        <select id="sportSel" onchange="renderSport()"></select>
        <div id="sportBody"></div>
      </div>
    </div>

    <!-- TEAM POINTS -->
    <div class="sec" id="tab-teams">
      <div class="card">
        <h1>🥇 Teams &amp; Cumulative Points</h1>
        <p class="hint">This feeds the overall points table on the main page. Add teams manually here.</p>
        <div id="teamsEditor"></div>
        <div class="row" style="margin-top:12px">
          <input id="newTeam" placeholder="New team name">
          <button class="btn green sm" onclick="addTeam()">+ Add team</button>
        </div>
        <div class="msg" id="teamMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   CONFIG — leave SCRIPT_URL empty to test LOCALLY (demo mode: data is
   stored in this browser and shared with index.html in the same browser).
   Set SCRIPT_URL to the deployed Apps Script /exec URL to go live.
   ===================================================================== */
const CONFIG = { SCRIPT_URL:"", SHEET_ID:"", EVENTS_TAB:"Events" };
const DEMO = !CONFIG.SCRIPT_URL;
const DEMO_CRED = { user:"admin", pass:"cloudOnam26!" };
const DB_KEY = "onam_db";

const FALLBACK_EVENTS = ["Badminton","Carroms","Surprise Event","Treasure Hunt","Cycle Slow Race",
 "IPL Fantasy League","Coconut Race","Raise the Ball","Kulam Kara","Fill the Bottle","Fruit Carving",
 "3s Football QFs + SFs","Shoot Out Competition","3s Football Final + L.Finals","Tug of War - Men",
 "Tug of War - Women","Uriyadi","The Perfect Slice","Musical Chair","Balloon the Pyramid",
 "Onion Peeling","Quiz Challenge","Pookkalam","Photography"];

const SEED = {
  teams:[{name:"Team A",cap:"Arun",vc:"Vishnu",points:28},{name:"Team B",cap:"Manu",vc:"Kiran",points:22},
         {name:"Team C",cap:"Deepa",vc:"Meera",points:19},{name:"Team D",cap:"Roy",vc:"Sanjay",points:15}],
  participants:[
    {id:"P1",event:"Badminton",name:"Arun & Vishnu",dept:"Engineering",phone:"7012041423",team:"Team A",gender:"Gents",notes:"",addedBy:"seed",ts:""},
    {id:"P2",event:"Badminton",name:"Manu & Kiran",dept:"F&B Service",phone:"8714110477",team:"Team B",gender:"Gents",notes:"",addedBy:"seed",ts:""},
    {id:"P3",event:"Carroms",name:"Deepa & Meera",dept:"HR",phone:"",team:"Team C",gender:"",notes:"",addedBy:"seed",ts:""}
  ],
  matches:[
    {id:"M1",event:"Badminton",teamA:"Team A",teamB:"Team B",status:"Live",scoreA:"1",scoreB:"0",winner:"",note:""},
    {id:"M2",event:"Carroms",teamA:"Team C",teamB:"Team D",status:"Done",scoreA:"25",scoreB:"18",winner:"Team C",note:""}
  ]
};

/* ---------- local demo DB (shared with index.html via localStorage) ---------- */
function dbLoad(){ try{ return JSON.parse(localStorage.getItem(DB_KEY)); }catch(e){ return null; } }
function dbSave(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function dbEnsure(){ let db=dbLoad(); if(!db){ db=JSON.parse(JSON.stringify(SEED)); dbSave(db); }
  db.teams=db.teams||[]; db.participants=db.participants||[]; db.matches=db.matches||[]; return db; }
function uid(pre){ return pre+Date.now()+Math.floor((performance.now()%1000)); }

/* ---------- data layer (demo local vs live Apps Script) ---------- */
let CRED={user:"",pass:""}, TEAMS=[], PARTICIPANTS=[], MATCHES=[], EVENTS=[];

async function api(payload){
  const res=await fetch(CONFIG.SCRIPT_URL,{method:"POST",redirect:"follow",
    headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  return await res.json();
}
async function dataAuth(u,p){
  if(DEMO) return (u===DEMO_CRED.user&&p===DEMO_CRED.pass)?{ok:true}:{ok:false,error:"Invalid username or password"};
  return await api({action:"auth",user:u,pass:p});
}
async function dataGetAll(){
  if(DEMO){ const db=dbEnsure(); return {ok:true,teams:db.teams,participants:db.participants,matches:db.matches}; }
  return await api({action:"all"});
}
async function dataAddParticipant(p){
  if(DEMO){ const db=dbEnsure(); db.participants.push(Object.assign({id:uid("P"),ts:new Date().toLocaleString(),addedBy:CRED.user+" (demo)"},p)); dbSave(db); return {ok:true}; }
  return await api({action:"add",user:CRED.user,pass:CRED.pass,p:p});
}
async function dataDelParticipant(id){
  if(DEMO){ const db=dbEnsure(); db.participants=db.participants.filter(x=>x.id!==id); dbSave(db); return {ok:true}; }
  return await api({action:"delete",user:CRED.user,pass:CRED.pass,rowId:id});
}
async function dataSaveMatch(m){
  if(DEMO){ const db=dbEnsure(); const i=db.matches.findIndex(x=>x.id===m.id);
    if(i>=0) db.matches[i]=m; else { m.id=uid("M"); db.matches.push(m); } dbSave(db); return {ok:true}; }
  return await api({action:"saveMatch",user:CRED.user,pass:CRED.pass,m:m});
}
async function dataDelMatch(id){
  if(DEMO){ const db=dbEnsure(); db.matches=db.matches.filter(x=>x.id!==id); dbSave(db); return {ok:true}; }
  return await api({action:"delMatch",user:CRED.user,pass:CRED.pass,rowId:id});
}
async function dataSaveTeams(teams){
  if(DEMO){ const db=dbEnsure(); db.teams=teams; dbSave(db); return {ok:true}; }
  return await api({action:"saveTeams",user:CRED.user,pass:CRED.pass,teams:teams});
}

/* ---------- helpers ---------- */
function $(id){ return document.getElementById(id); }
function show(id){ $(id).style.display='block'; } function hide(id){ $(id).style.display='none'; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function msg(id,t,ok){ const m=$(id); m.textContent=t; m.className='msg '+(ok?'ok':'err'); }
function teamNames(){ return TEAMS.map(t=>t.name); }

/* ---------- auth ---------- */
async function login(){
  const u=$('u').value.trim(), p=$('p').value;
  if(!u||!p){ msg('loginMsg','Enter username and password',false); return; }
  msg('loginMsg','Checking…',true);
  try{ const r=await dataAuth(u,p);
    if(r.ok){ CRED={user:u,pass:p}; sessionStorage.setItem('onam_cred',JSON.stringify(CRED)); enterApp(); }
    else msg('loginMsg', r.error||'Invalid login', false);
  }catch(e){ msg('loginMsg','Cannot reach server — check SCRIPT_URL. '+e.message,false); }
}
function logout(){ CRED={user:"",pass:""}; sessionStorage.removeItem('onam_cred'); hide('appView'); show('loginView'); }
function enterApp(){ hide('loginView'); show('appView'); $('whoLabel').textContent='Logged in as '+CRED.user; loadEvents(); refreshAll(); }

function switchTab(btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active'); $(btn.dataset.t).classList.add('active');
}

/* ---------- events dropdown ---------- */
async function loadEvents(){
  EVENTS = FALLBACK_EVENTS.slice();
  if(CONFIG.SHEET_ID){ try{
    const url="https://docs.google.com/spreadsheets/d/"+CONFIG.SHEET_ID+"/gviz/tq?tqx=out:json&headers=1&sheet="+encodeURIComponent(CONFIG.EVENTS_TAB)+"&t="+Date.now();
    const txt=await (await fetch(url)).text();
    const j=JSON.parse(txt.substring(txt.indexOf("{"),txt.lastIndexOf("}")+1));
    const cols=j.table.cols.map(c=>c.label); const ei=cols.findIndex(c=>String(c).trim().toLowerCase()==='events');
    if(ei>=0){ EVENTS=j.table.rows.map(r=>r.c[ei]?(r.c[ei].f||r.c[ei].v):'').filter(Boolean); }
  }catch(e){} }
  const opts='<option value="">— select event —</option>'+EVENTS.map(n=>'<option>'+esc(n)+'</option>').join('');
  $('f_event').innerHTML=opts;
  $('sportSel').innerHTML=opts;
  $('filterEvent').innerHTML='<option value="">All events</option>'+EVENTS.map(n=>'<option>'+esc(n)+'</option>').join('');
}

/* ---------- master refresh ---------- */
async function refreshAll(flash){
  try{
    const r=await dataGetAll();
    TEAMS=r.teams||[]; PARTICIPANTS=r.participants||[]; MATCHES=r.matches||[];
    renderTeamlist(); renderList(); renderSport(); renderTeamsEditor();
    if(flash) { /* noop visual */ }
  }catch(e){ console.error(e); }
}
function renderTeamlist(){
  $('teamlist').innerHTML = teamNames().map(n=>'<option value="'+esc(n)+'">').join('');
}

/* ---------- participants ---------- */
async function addParticipant(){
  const p={event:$('f_event').value,team:$('f_team').value.trim(),name:$('f_name').value.trim(),
    dept:$('f_dept').value.trim(),phone:$('f_phone').value.trim(),gender:$('f_gender').value,notes:$('f_notes').value.trim()};
  if(!p.event||!p.name){ msg('addMsg','Event and name are required',false); return; }
  msg('addMsg','Saving…',true);
  try{ const r=await dataAddParticipant(p);
    if(r.ok){ await refreshAll(); msg('addMsg','✅ Saved: '+p.name+' → '+p.event,true);
      ['f_name','f_dept','f_phone','f_notes'].forEach(id=>$(id).value=''); $('f_name').focus(); }
    else msg('addMsg', r.error||'Could not save', false);
  }catch(e){ msg('addMsg','Error: '+e.message,false); }
}
function renderList(){
  const q=($('search').value||'').toLowerCase(), fe=$('filterEvent').value;
  const rows=PARTICIPANTS.filter(r=>{ if(fe&&r.event!==fe) return false;
    if(q){ const b=(r.name+' '+r.dept+' '+r.phone+' '+r.team).toLowerCase(); if(b.indexOf(q)<0) return false; } return true; });
  $('totalCount').textContent=rows.length+' shown / '+PARTICIPANTS.length+' total';
  $('listBody').innerHTML = rows.length ? rows.map((r,i)=>
    '<tr><td>'+(i+1)+'</td><td>'+esc(r.event)+'</td><td><b>'+esc(r.name)+'</b></td><td>'+esc(r.dept)+
    '</td><td>'+esc(r.phone)+'</td><td>'+esc(r.team)+'</td><td><button class="del" onclick="delPart(\''+esc(r.id)+'\')">Delete</button></td></tr>'
  ).join('') : '<tr><td colspan="7" style="text-align:center;color:#a07a3a;padding:18px">No registrations yet.</td></tr>';
}
async function delPart(id){ if(!confirm('Delete this registration?')) return; await dataDelParticipant(id); await refreshAll(); }

/* ---------- sports & matches ---------- */
function renderSport(){
  const ev=$('sportSel').value; const box=$('sportBody');
  if(!ev){ box.innerHTML='<p class="hint">Pick a sport to manage its participants and matches.</p>'; return; }
  const parts=PARTICIPANTS.filter(p=>p.event===ev);
  const matches=MATCHES.filter(m=>m.event===ev);
  const tOpts=teamNames().map(n=>'<option>'+esc(n)+'</option>').join('');

  let h='<h2 style="margin-top:14px">👥 Participants ('+parts.length+')</h2>';
  h+= parts.length ? '<table><thead><tr><th>#</th><th>Name</th><th>Dept</th><th>Team</th></tr></thead><tbody>'+
      parts.map((p,i)=>'<tr><td>'+(i+1)+'</td><td><b>'+esc(p.name)+'</b></td><td>'+esc(p.dept)+'</td><td>'+esc(p.team)+'</td></tr>').join('')+
      '</tbody></table>' : '<p class="hint">No participants registered for this sport yet.</p>';

  h+='<h2 style="margin-top:20px">⚔️ Matches / Results</h2>';
  h+='<div id="matchList">'+ (matches.length? matches.map(m=>matchRow(m,tOpts)).join('') : '<p class="hint">No matches yet.</p>') +'</div>';

  h+='<div class="matchrow" style="background:#f7f2e6">'+
     '<select id="nmA"><option value="">Team A…</option>'+tOpts+'</select>'+
     '<b>vs</b>'+
     '<select id="nmB"><option value="">Team B…</option>'+tOpts+'</select>'+
     '<button class="btn green sm" onclick="addMatch(\''+esc(ev)+'\')">+ Add match</button></div>';
  h+='<div class="hint">Set a match to <b>Live</b> to show it on the main page. Set <b>Done</b> and pick a winner to record the result.</div>';
  box.innerHTML=h;
}
function matchRow(m,tOpts){
  const sel=(v,val)=>v===val?' selected':'';
  const wOpts='<option value="">— winner —</option>'+
    '<option'+sel(m.winner,m.teamA)+'>'+esc(m.teamA)+'</option>'+
    '<option'+sel(m.winner,m.teamB)+'>'+esc(m.teamB)+'</option>'+
    '<option'+sel(m.winner,"Draw")+'>Draw</option>';
  const st=m.status||'Scheduled';
  const pill='<span class="pill '+(st==='Live'?'live':st==='Done'?'done':'sched')+'">'+esc(st)+'</span>';
  return '<div class="matchrow" data-id="'+esc(m.id)+'">'+
    '<div class="vs">'+esc(m.teamA)+' <span style="color:#b98a3a">vs</span> '+esc(m.teamB)+' &nbsp;'+pill+'</div>'+
    '<input class="scoreIn" id="sa_'+esc(m.id)+'" value="'+esc(m.scoreA)+'" placeholder="0">'+
    '<span>:</span>'+
    '<input class="scoreIn" id="sb_'+esc(m.id)+'" value="'+esc(m.scoreB)+'" placeholder="0">'+
    '<select id="stt_'+esc(m.id)+'"><option'+sel(st,"Scheduled")+'>Scheduled</option><option'+sel(st,"Live")+'>Live</option><option'+sel(st,"Done")+'>Done</option></select>'+
    '<select id="win_'+esc(m.id)+'">'+wOpts+'</select>'+
    '<button class="btn sm" onclick="saveMatch(\''+esc(m.id)+'\')">Save</button>'+
    '<button class="del" onclick="delMatch(\''+esc(m.id)+'\')">✕</button>'+
    '</div>';
}
async function addMatch(ev){
  const a=$('nmA').value, b=$('nmB').value;
  if(!a||!b){ alert('Pick both teams'); return; }
  if(a===b){ alert('Pick two different teams'); return; }
  await dataSaveMatch({id:"",event:ev,teamA:a,teamB:b,status:"Scheduled",scoreA:"",scoreB:"",winner:"",note:""});
  await refreshAll();
}
async function saveMatch(id){
  const m=MATCHES.find(x=>x.id===id); if(!m) return;
  const upd=Object.assign({},m,{scoreA:$('sa_'+id).value.trim(),scoreB:$('sb_'+id).value.trim(),
    status:$('stt_'+id).value,winner:$('win_'+id).value});
  await dataSaveMatch(upd); await refreshAll();
}
async function delMatch(id){ if(!confirm('Delete this match?')) return; await dataDelMatch(id); await refreshAll(); }

/* ---------- team points ---------- */
function renderTeamsEditor(){
  const box=$('teamsEditor');
  if(!TEAMS.length){ box.innerHTML='<p class="hint">No teams yet — add one below.</p>'; return; }
  let h='<table><thead><tr><th>Team</th><th>Captain</th><th>Vice Captain</th><th>Points</th><th></th></tr></thead><tbody>';
  TEAMS.forEach((t,i)=>{ h+='<tr>'+
    '<td><input id="tn_'+i+'" value="'+esc(t.name)+'"></td>'+
    '<td><input id="tc_'+i+'" value="'+esc(t.cap||"")+'"></td>'+
    '<td><input id="tv_'+i+'" value="'+esc(t.vc||"")+'"></td>'+
    '<td><input id="tp_'+i+'" class="scoreIn" value="'+esc(t.points!=null?t.points:0)+'"></td>'+
    '<td><button class="del" onclick="delTeam('+i+')">✕</button></td></tr>'; });
  h+='</tbody></table><button class="btn green sm" style="margin-top:10px" onclick="saveTeams()">💾 Save team points</button>';
  box.innerHTML=h;
}
async function addTeam(){
  const n=$('newTeam').value.trim(); if(!n){ return; }
  TEAMS.push({name:n,cap:"",vc:"",points:0}); $('newTeam').value='';
  await dataSaveTeams(TEAMS); await refreshAll(); msg('teamMsg','✅ Added '+n,true);
}
async function delTeam(i){ if(!confirm('Remove '+TEAMS[i].name+'?')) return; TEAMS.splice(i,1); await dataSaveTeams(TEAMS); await refreshAll(); }
async function saveTeams(){
  const out=TEAMS.map((t,i)=>({name:$('tn_'+i).value.trim(),cap:$('tc_'+i).value.trim(),
    vc:$('tv_'+i).value.trim(),points:parseFloat($('tp_'+i).value)||0}));
  await dataSaveTeams(out); await refreshAll(); msg('teamMsg','✅ Saved',true);
}
